<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>登場人物一覧</title>

  <style>
    :root{
      --bg: #0c0f14;
      --panel: rgba(255,255,255,.06);
      --panel2: rgba(255,255,255,.10);
      --line: rgba(255,255,255,.14);
      --text: rgba(255,255,255,.90);
      --muted: rgba(255,255,255,.62);
      --shadow: 0 18px 55px rgba(0,0,0,.45);
      --radius: 16px;
    }

    *{ box-sizing: border-box; }

    body{
      margin: 0;
      padding: 28px 18px 42px;
      background:
        radial-gradient(900px 600px at 12% 8%, rgba(160,45,60,.25), transparent 55%),
        radial-gradient(800px 520px at 92% 18%, rgba(75,120,200,.22), transparent 58%),
        linear-gradient(180deg, #07090c, var(--bg));
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI",
                   "Hiragino Kaku Gothic ProN", "Noto Sans JP", Arial, sans-serif;
    }

    /* うっすら “極秘資料” っぽいヘッダ */
    header{
      max-width: 1200px;
      margin: 0 auto 18px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--panel2), var(--panel));
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .header-top{
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .stamp{
      font-size: 12px;
      letter-spacing: .14em;
      color: var(--muted);
      text-transform: uppercase;
      user-select: none;
    }
    h1{
      margin: 0;
      font-size: 18px;
      letter-spacing: .08em;
      font-weight: 700;
    }

    /* タイル状グリッド */
    .grid-container{
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(165px, 1fr));
      gap: 14px;
      max-width: 1200px;
      margin: 0 auto;
      padding: 4px;
    }

    /* カード */
    .char-card{
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
      box-shadow: 0 12px 28px rgba(0,0,0,.35);
      overflow: hidden;
      transform: translateZ(0);
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }
    .char-card:hover{
      transform: translateY(-4px);
      border-color: rgba(255,255,255,.28);
      box-shadow: 0 18px 42px rgba(0,0,0,.45);
    }

    /* 画像を“タイルっぽく”綺麗に統一 */
    .char-card img{
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      background: rgba(0,0,0,.25);
      filter: contrast(1.02) saturate(1.02);
    }

    /* 名前だけ */
    .char-name{
      padding: 10px 10px 12px;
      text-align: center;
      font-size: 14px;
      letter-spacing: .06em;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* 画面が狭い時の詰まりを少し緩める */
    @media (max-width: 420px){
      body{ padding: 20px 12px 34px; }
      .grid-container{ grid-template-columns: repeat(auto-fit, minmax(145px, 1fr)); }
      h1{ font-size: 16px; }
    }

    /* ユーザーが設定してる場合、動きを減らす */
    @media (prefers-reduced-motion: reduce){
      .char-card{ transition: none; }
      .char-card:hover{ transform: none; }
    }
	
	/* ===== badges / marks ===== */
.char-card{ position: relative; }

.badges{
  position: absolute;
  top: 10px;
  left: 10px;
  display: flex;
  gap: 6px;
  z-index: 2;
  pointer-events: none;
}

.badge{
  font-size: 11px;
  letter-spacing: .08em;
  padding: 4px 8px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,.22);
  background: rgba(0,0,0,.35);
  color: rgba(255,255,255,.88);
  backdrop-filter: blur(8px);
  box-shadow: 0 10px 22px rgba(0,0,0,.35);
}


.badge.participant{
  border-color: rgba(255, 90, 90, .75);
  background: linear-gradient(
    135deg,
    rgba(210, 40, 40, .88),
    rgba(160, 25, 25, .88)
  );
  color: #fff;
  font-weight: 600;
  text-shadow: 0 1px 3px rgba(0,0,0,.55);
    box-shadow: 0 4px 10px rgba(0,0,0,.35);
}


.badge.staff{
  border-color: rgba(200, 210, 230, .40);
  background: rgba(20, 24, 34, .70);
  color: #fff;
  box-shadow: 0 4px 10px rgba(0,0,0,.35);
}


.badge.intruder{
  border-color: rgba(70, 230, 210, .75);
  background: linear-gradient(
    135deg,
    rgba(40, 190, 200, .88),
    rgba(20, 140, 170, .88)
  );
  color: #fff;
  font-weight: 600;
  text-shadow: 0 1px 3px rgba(0,0,0,.55);
  box-shadow: 0 4px 10px rgba(0,0,0,.35);
}


.mark{
  position: absolute;
  top: 10px;
  right: 10px;
  z-index: 2;
  pointer-events: none;

  font-size: 11px;
  letter-spacing: .16em;
  padding: 4px 8px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,.22);
  background: rgba(255,255,255,.10);
  color: rgba(255,255,255,.90);
  backdrop-filter: blur(8px);
}

.mark.sub{
  border: 1px solid rgba(255, 210, 70, 0.70);
  background: linear-gradient(
    135deg,
    rgba(255, 215, 70, 0.95),
    rgba(240, 170, 40, 0.95)
  );
  color: rgba(30, 20, 0, 0.95);
  font-weight: 800;
  text-shadow: 0 1px 0 rgba(255,255,255,.35);
  box-shadow: 0 6px 14px rgba(0,0,0,.35);
}

.legend{
  max-width: 1200px;
  margin: 10px auto 14px;
  padding: 0 6px;
  font-size: 12px;
  letter-spacing: .08em;
  color: rgba(255,255,255,.62);
}


/* ===== Modal ===== */
.modal{
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 18px;
  z-index: 9999;
}

.modal.is-open{ display: flex; }

.modal-overlay{
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,.62);
  backdrop-filter: blur(6px);
}

.modal-panel{
  position: relative;
  width: min(920px, 96vw);
  max-height: min(86vh, 860px);
  overflow: auto;
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,.16);
  background: linear-gradient(180deg, rgba(18,22,32,.92), rgba(10,12,18,.92));
  box-shadow: 0 30px 90px rgba(0,0,0,.6);
  color: rgba(255,255,255,.92);
}

.modal-close{
  position: sticky;
  top: 0;
  display: flex;
  justify-content: flex-end;
  padding: 10px 10px 0;
  z-index: 2;
}

.modal-close button{
  appearance: none;
  border: 1px solid rgba(255,255,255,.18);
  background: rgba(255,255,255,.08);
  color: rgba(255,255,255,.92);
  border-radius: 12px;
  padding: 8px 10px;
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
}

.modal-body{
  padding: 12px 16px 18px;
}

/* モーダル内のカードを少し整える（最低限） */
.modal-panel img{
  max-width: 100%;
  height: auto;
}


/* ===== Character Detail (modal only) ===== */
.modal-body .chara-name{
  margin: 4px 0 12px;
  font-weight: 800;
  letter-spacing: .06em;
}

.modal-body .chara-name ruby rt{
  font-size: 12px;
  letter-spacing: .10em;
  color: rgba(255,255,255,.70);
}

.modal-body .chara-card{
  margin-top: 12px;
}

.modal-body .chara-layout{
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 18px;
  align-items: start;
}

/* 画像枠：白背景でも浮かない */
.modal-body .chara-portrait{
  margin: 0;
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,.14);
  background: rgba(255,255,255,.04);
  box-shadow: 0 18px 40px rgba(0,0,0,.45);
}

.modal-body .chara-portrait img{
  width: 100%;
  display: block;
  aspect-ratio: 1 / 1;
  object-fit: cover;
}

/* 年齢/血液型…：横並びの資料表 */
.modal-body .chara-stats{
  margin: 0 0 14px;
  padding: 0;
  display: grid;
  grid-template-columns: 180px 1fr;
  gap: 10px 14px;
  align-items: center;
}

.modal-body .chara-stats dt{
  margin: 0;
  padding: 10px 12px;
  border-radius: 12px;
  background: rgba(255,255,255,.10);
  border: 1px solid rgba(255,255,255,.16);
  color: rgba(255,255,255,.92);
  text-align: center;
  font-weight: 800;
  letter-spacing: .12em;
}

.modal-body .chara-stats dd{
  margin: 0;
  padding: 10px 12px;
  border-radius: 12px;
  background: rgba(0,0,0,.22);
  border: 1px solid rgba(255,255,255,.10);
  color: rgba(255,255,255,.92);
  font-weight: 650;
  letter-spacing: .04em;
}

.modal-body .chara-tagline{
  margin: 10px 0 10px;
  font-weight: 800;
  letter-spacing: .08em;
  color: rgba(255,255,255,.92);
}

.modal-body .chara-desc{
  margin: 0 0 10px;
  line-height: 1.85;
  color: rgba(255,255,255,.82);
}

@media (max-width: 720px){
  .modal-body .chara-layout{
    grid-template-columns: 1fr;
  }
  .modal-body .chara-stats{
    grid-template-columns: 140px 1fr;
  }
}


	
  </style>
</head>
